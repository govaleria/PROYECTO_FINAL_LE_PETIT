<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Petit Café</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<div class="container">
    <div class="card">

        <img src="{{ url_for('static', filename='favicon.ico') }}" alt="Le Petit Café" class="logo">

        <h1>Le Petit Café</h1>

        {% if user %}
            <div class="logged-in">
                <p class="success"> Sesión iniciada correctamente</p>

                <div class="user-info">
                    {% if user.picture %}
                        <img src="{{ user.picture }}" alt="Profile" class="profile-pic">
                    {% endif %}

                    <h2>{{ user.name }}</h2>
                    <p>{{ user.email }}</p>
                </div>

                <a href="/go-to-frontend" class="button">Entrar al sitio</a>
                <a href="/logout" class="button logout">Cerrar sesión</a>
            </div>

        {% else %}
            <div class="logged-out">
                <p>¡Bienvenido! inicia sesión para continuar</p>
                <a href="/login" class="button">Iniciar Sesión</a>
            </div>
        {% endif %}

    </div>
</div>
</body>
</html>
